name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-assets:
    name: Build release asset (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    env:
      CC: clang
      CXX: clang++
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS 26 — native runtime, requires macOS 26+
          - name: macOS 26 (arm64)
            runner: macos-26
            setup_xcode: true
            setup_swift: false
            install_command: brew install openssl@3
            build_command: make build PRODUCT=cli PLATFORM=macos RUNTIME=native ARCH=arm64 DECRYPTER=openssl BAZEL_ARGS="--config=ci --config=macos --config=release" OPENSSL_LIB="$(brew --prefix openssl@3)/lib/libcrypto.3.dylib"
            package_command: |
              mkdir -p dist/fragseal-macos-26-arm64
              cp bazel-bin/FragSeal/fragseal_arm64 dist/fragseal-macos-26-arm64/fragseal
              chmod +x dist/fragseal-macos-26-arm64/fragseal
              tar -C dist -czf dist/fragseal-macos-26-arm64.tar.gz fragseal-macos-26-arm64
            asset_path: dist/fragseal-macos-26-arm64.tar.gz
          - name: macOS 26 (x86_64)
            runner: macos-26
            setup_xcode: true
            setup_swift: false
            install_command: brew install openssl@3
            build_command: make build PRODUCT=cli PLATFORM=macos RUNTIME=native ARCH=x86_64 DECRYPTER=openssl BAZEL_ARGS="--config=ci --config=macos --config=release" OPENSSL_LIB="$(brew --prefix openssl@3)/lib/libcrypto.3.dylib"
            package_command: |
              mkdir -p dist/fragseal-macos-26-x86_64
              cp bazel-bin/FragSeal/fragseal_x86_64 dist/fragseal-macos-26-x86_64/fragseal
              chmod +x dist/fragseal-macos-26-x86_64/fragseal
              tar -C dist -czf dist/fragseal-macos-26-x86_64.tar.gz fragseal-macos-26-x86_64
            asset_path: dist/fragseal-macos-26-x86_64.tar.gz
          - name: macOS 26 (Universal)
            runner: macos-26
            setup_xcode: true
            setup_swift: false
            install_command: brew install openssl@3
            build_command: make build PRODUCT=cli PLATFORM=macos RUNTIME=native DECRYPTER=openssl BAZEL_ARGS="--config=ci --config=macos --config=release" OPENSSL_LIB="$(brew --prefix openssl@3)/lib/libcrypto.3.dylib"
            package_command: |
              mkdir -p dist/fragseal-macos-26-universal
              cp bazel-bin/FragSeal/universal_fragseal dist/fragseal-macos-26-universal/fragseal
              chmod +x dist/fragseal-macos-26-universal/fragseal
              tar -C dist -czf dist/fragseal-macos-26-universal.tar.gz fragseal-macos-26-universal
            asset_path: dist/fragseal-macos-26-universal.tar.gz
          # macOS 14-15 - backdeploy runtime, bundles compatibility shim
          - name: macOS 14-15 (arm64)
            runner: macos-15
            setup_xcode: true
            setup_swift: false
            install_command: brew install openssl@3
            build_command: make build PRODUCT=cli PLATFORM=macos RUNTIME=backdeploy ARCH=arm64 DECRYPTER=openssl BAZEL_ARGS="--config=ci --config=macos --config=release" OPENSSL_LIB="$(brew --prefix openssl@3)/lib/libcrypto.3.dylib"
            package_command: |
              mkdir -p dist/fragseal-macos-14-15-arm64/Frameworks
              cp bazel-bin/FragSeal/arm64/fragseal_backdeploy dist/fragseal-macos-14-15-arm64/fragseal
              cp bazel-bin/FragSeal/arm64/Frameworks/libswiftCompatibilitySpan.dylib dist/fragseal-macos-14-15-arm64/Frameworks/
              chmod +x dist/fragseal-macos-14-15-arm64/fragseal
              tar -C dist -czf dist/fragseal-macos-14-15-arm64.tar.gz fragseal-macos-14-15-arm64
            asset_path: dist/fragseal-macos-14-15-arm64.tar.gz
          - name: macOS 14-15 (x86_64)
            runner: macos-15
            setup_xcode: true
            setup_swift: false
            install_command: brew install openssl@3
            build_command: make build PRODUCT=cli PLATFORM=macos RUNTIME=backdeploy ARCH=x86_64 DECRYPTER=openssl BAZEL_ARGS="--config=ci --config=macos --config=release" OPENSSL_LIB="$(brew --prefix openssl@3)/lib/libcrypto.3.dylib"
            package_command: |
              mkdir -p dist/fragseal-macos-14-15-x86_64/Frameworks
              cp bazel-bin/FragSeal/x86_64/fragseal_backdeploy dist/fragseal-macos-14-15-x86_64/fragseal
              cp bazel-bin/FragSeal/x86_64/Frameworks/libswiftCompatibilitySpan.dylib dist/fragseal-macos-14-15-x86_64/Frameworks/
              chmod +x dist/fragseal-macos-14-15-x86_64/fragseal
              tar -C dist -czf dist/fragseal-macos-14-15-x86_64.tar.gz fragseal-macos-14-15-x86_64
            asset_path: dist/fragseal-macos-14-15-x86_64.tar.gz
          - name: macOS 14-15 (Universal)
            runner: macos-15
            setup_xcode: true
            setup_swift: false
            install_command: brew install openssl@3
            build_command: make build PRODUCT=cli PLATFORM=macos RUNTIME=backdeploy DECRYPTER=openssl BAZEL_ARGS="--config=ci --config=macos --config=release" OPENSSL_LIB="$(brew --prefix openssl@3)/lib/libcrypto.3.dylib"
            package_command: |
              mkdir -p dist/fragseal-macos-14-15-universal/Frameworks
              cp bazel-bin/FragSeal/fragseal_backdeploy dist/fragseal-macos-14-15-universal/fragseal
              cp bazel-bin/FragSeal/Frameworks/libswiftCompatibilitySpan.dylib dist/fragseal-macos-14-15-universal/Frameworks/
              chmod +x dist/fragseal-macos-14-15-universal/fragseal
              tar -C dist -czf dist/fragseal-macos-14-15-universal.tar.gz fragseal-macos-14-15-universal
            asset_path: dist/fragseal-macos-14-15-universal.tar.gz
          # Ubuntu
          - name: Ubuntu (x86_64)
            runner: ubuntu-latest
            setup_xcode: false
            setup_swift: true
            install_command: |
              sudo apt-get update
              sudo apt-get install -y libssl-dev libxml2-dev pkg-config clang lldb lld
            build_command: make build PRODUCT=cli PLATFORM=linux DECRYPTER=openssl BAZEL_ARGS="--config=ci --config=release"
            package_command: |
              mkdir -p dist/fragseal-linux-x86_64
              cp bazel-bin/FragSeal/fragseal_cli_linux dist/fragseal-linux-x86_64/fragseal
              chmod +x dist/fragseal-linux-x86_64/fragseal
              tar -C dist -czf dist/fragseal-linux-x86_64.tar.gz fragseal-linux-x86_64
            asset_path: dist/fragseal-linux-x86_64.tar.gz
          - name: Ubuntu (arm64)
            runner: ubuntu-24.04-arm
            setup_xcode: false
            setup_swift: true
            install_command: |
              sudo apt-get update
              sudo apt-get install -y libssl-dev libxml2-dev pkg-config clang lldb lld
            build_command: make build PRODUCT=cli PLATFORM=linux DECRYPTER=openssl BAZEL_ARGS="--config=ci --config=release"
            package_command: |
              mkdir -p dist/fragseal-linux-arm64
              cp bazel-bin/FragSeal/fragseal_cli_linux dist/fragseal-linux-arm64/fragseal
              chmod +x dist/fragseal-linux-arm64/fragseal
              tar -C dist -czf dist/fragseal-linux-arm64.tar.gz fragseal-linux-arm64
            asset_path: dist/fragseal-linux-arm64.tar.gz
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26
        if: ${{ matrix.setup_xcode }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Swift
        if: ${{ matrix.setup_swift }}
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"
          skip-verify-signature: true

      - name: Show toolchain
        run: |
          if command -v xcodebuild >/dev/null 2>&1; then
            xcodebuild -version
          fi
          if command -v clang >/dev/null 2>&1; then
            clang --version
          fi
          swift --version

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}
          repository-cache: true

      - name: Install system dependencies
        run: ${{ matrix.install_command }}

      - name: Configure Bazel CC (Linux)
        if: runner.os == 'Linux'
        run: |
          FILTERED_PATH=$(echo "$PATH" | tr ':' '\n' | grep -v "^${SWIFTLY_BIN_DIR:-}$" | paste -sd: -)
          if [ -z "$FILTERED_PATH" ]; then
            FILTERED_PATH="$PATH"
          fi

          # Find the real system clang, bypassing Swiftly shims in PATH.
          CLANG=$(PATH="$FILTERED_PATH" which clang)
          CLANGPP=$(PATH="$FILTERED_PATH" which clang++)

          # Prefer the concrete Swift toolchain bin over swiftly shim binaries.
          SWIFT_TOOLCHAIN_BIN=""
          if command -v swiftly >/dev/null 2>&1; then
            SWIFT_TOOLCHAIN_ROOT="$(swiftly use --print-location 2>/dev/null | grep '^/' | tail -n 1)"
            SWIFT_TOOLCHAIN_BIN="$SWIFT_TOOLCHAIN_ROOT/usr/bin"
          fi
          if [ -z "$SWIFT_TOOLCHAIN_BIN" ] || [ ! -x "$SWIFT_TOOLCHAIN_BIN/swiftc" ]; then
            SWIFT_TOOLCHAIN_BIN="$(dirname "$(PATH="$FILTERED_PATH" which swiftc)")"
          fi
          SWIFT_TOOLCHAIN_USR="$(cd "$SWIFT_TOOLCHAIN_BIN/.." && pwd)"
          SWIFT_TOOLCHAIN_ROOT="$(cd "$SWIFT_TOOLCHAIN_USR/.." && pwd)"

          echo "PATH=$SWIFT_TOOLCHAIN_BIN:$FILTERED_PATH" >> "$GITHUB_ENV"

          # Write as build:swift_linux to .bazelrc.local (try-import'd last in .bazelrc),
          # so these config entries are expanded after the workspace .bazelrc ones and win.
          cat > .bazelrc.local <<EOF
          build:swift_linux --repo_env=CC=$CLANG
          build:swift_linux --repo_env=CXX=$CLANGPP
          build:swift_linux --action_env=CC=$CLANG
          build:swift_linux --action_env=CXX=$CLANGPP
          build:swift_linux --repo_env=SWIFT_BIN=$SWIFT_TOOLCHAIN_BIN/swift
          build:swift_linux --repo_env=SWIFTC_BIN=$SWIFT_TOOLCHAIN_BIN/swiftc
          build:swift_linux --repo_env=SWIFT_TOOLCHAIN_USR=$SWIFT_TOOLCHAIN_USR
          build:swift_linux --repo_env=SWIFT_TOOLCHAIN_ROOT=$SWIFT_TOOLCHAIN_ROOT
          build:swift_linux --repo_env=PATH=$SWIFT_TOOLCHAIN_BIN:$FILTERED_PATH
          build:swift_linux --repo_env=HOME=$HOME
          EOF
          echo "Configured CC=$CLANG"
          echo "Configured Swift toolchain bin=$SWIFT_TOOLCHAIN_BIN"
          echo "Configured Swift toolchain usr=$SWIFT_TOOLCHAIN_USR"
          echo "Configured Swift toolchain root=$SWIFT_TOOLCHAIN_ROOT"
          "$CLANG" --version
          "$SWIFT_TOOLCHAIN_BIN/swiftc" --version

      - name: Build release binary
        run: |
          unset SWIFTLY_HOME_DIR
          unset SWIFTLY_BIN_DIR
          ${{ matrix.build_command }}

      - name: Package release asset
        run: ${{ matrix.package_command }}

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.asset_path }}
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub release
    needs: build-assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Build checksum manifest
        run: |
          find dist -type f -name '*.tar.gz' -print0 | sort -z | xargs -0 sha256sum > dist/SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
