name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

env:
  BAZEL_CI_ARGS: --config=ci

jobs:
  macos-tests:
    name: macOS tests (${{ matrix.runtime }}, ${{ matrix.decrypter }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            runtime: native
            decrypter: commoncrypto
          - runner: macos-26
            runtime: native
            decrypter: openssl
          - runner: macos-15
            runtime: backdeploy
            decrypter: commoncrypto
          - runner: macos-15
            runtime: backdeploy
            decrypter: openssl
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swiftc --version

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}
          repository-cache: true

      - name: Install OpenSSL
        run: brew install openssl@3

      - name: Run tests
        run: |
          OPENSSL_LIB="$(brew --prefix openssl@3)/lib/libcrypto.3.dylib"
          make test \
            RUNTIME=${{ matrix.runtime }} \
            DECRYPTER=${{ matrix.decrypter }} \
            OPENSSL_LIB="$OPENSSL_LIB" \
            BAZEL_ARGS="${BAZEL_CI_ARGS} --config=macos"

  macos-builds:
    name: macOS build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cli-backdeploy
            runner: macos-15
            make_args: PRODUCT=cli PLATFORM=macos RUNTIME=backdeploy DECRYPTER=openssl
          - name: cli-native
            runner: macos-26
            make_args: PRODUCT=cli PLATFORM=macos RUNTIME=native DECRYPTER=openssl
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swiftc --version

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}
          repository-cache: true

      - name: Install OpenSSL
        run: brew install openssl@3

      - name: Build
        run: |
          OPENSSL_LIB="$(brew --prefix openssl@3)/lib/libcrypto.3.dylib"
          make build \
            ${{ matrix.make_args }} \
            OPENSSL_LIB="$OPENSSL_LIB" \
            BAZEL_ARGS="${BAZEL_CI_ARGS} --config=macos"

  linux-tests:
    name: Linux tests (openssl, ${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    env:
      CC: clang
      CXX: clang++
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64
            runner: ubuntu-latest
          - name: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Install Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"
          skip-verify-signature: true

      - name: Show toolchain
        run: |
          clang --version
          swift --version

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}
          repository-cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libxml2-dev pkg-config clang lldb lld

      - name: Configure Bazel CC (Linux)
        if: runner.os == 'Linux'
        run: |
          FILTERED_PATH=$(echo "$PATH" | tr ':' '\n' | grep -v "^${SWIFTLY_BIN_DIR:-}$" | paste -sd: -)
          if [ -z "$FILTERED_PATH" ]; then
            FILTERED_PATH="$PATH"
          fi

          CLANG=$(PATH="$FILTERED_PATH" which clang)
          CLANGPP=$(PATH="$FILTERED_PATH" which clang++)

          SWIFT_TOOLCHAIN_BIN=""
          if command -v swiftly >/dev/null 2>&1; then
            SWIFT_TOOLCHAIN_ROOT="$(swiftly use --print-location 2>/dev/null | grep '^/' | tail -n 1)"
            SWIFT_TOOLCHAIN_BIN="$SWIFT_TOOLCHAIN_ROOT/usr/bin"
          fi
          if [ -z "$SWIFT_TOOLCHAIN_BIN" ] || [ ! -x "$SWIFT_TOOLCHAIN_BIN/swiftc" ]; then
            SWIFT_TOOLCHAIN_BIN="$(dirname "$(PATH="$FILTERED_PATH" which swiftc)")"
          fi

          echo "PATH=$SWIFT_TOOLCHAIN_BIN:$FILTERED_PATH" >> "$GITHUB_ENV"

          cat > .bazelrc.local <<EOF
          build:swift_linux --repo_env=CC=$CLANG
          build:swift_linux --repo_env=CXX=$CLANGPP
          build:swift_linux --action_env=CC=$CLANG
          build:swift_linux --action_env=CXX=$CLANGPP
          EOF

          echo "Configured CC=$CLANG"
          echo "Configured Swift toolchain bin=$SWIFT_TOOLCHAIN_BIN"
          "$CLANG" --version
          "$SWIFT_TOOLCHAIN_BIN/swiftc" --version

      - name: Run tests
        run: |
          unset SWIFTLY_HOME_DIR
          unset SWIFTLY_BIN_DIR
          unset CPLUS_INCLUDE_PATH
          unset C_INCLUDE_PATH
          unset CPATH
          make test \
            PLATFORM=linux \
            DECRYPTER=openssl \
            BAZEL_ARGS="${BAZEL_CI_ARGS}"

  linux-builds:
    name: Linux build (${{ matrix.name }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    env:
      CC: clang
      CXX: clang++
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cli
            arch: x86_64
            runner: ubuntu-latest
            make_args: PRODUCT=cli PLATFORM=linux DECRYPTER=openssl
          - name: cli
            arch: arm64
            runner: ubuntu-24.04-arm
            make_args: PRODUCT=cli PLATFORM=linux DECRYPTER=openssl
    steps:
      - uses: actions/checkout@v6

      - name: Install Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"
          skip-verify-signature: true

      - name: Show toolchain
        run: |
          clang --version
          swift --version

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}
          repository-cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libxml2-dev pkg-config clang lldb lld

      - name: Configure Bazel CC (Linux)
        if: runner.os == 'Linux'
        run: |
          FILTERED_PATH=$(echo "$PATH" | tr ':' '\n' | grep -v "^${SWIFTLY_BIN_DIR:-}$" | paste -sd: -)
          if [ -z "$FILTERED_PATH" ]; then
            FILTERED_PATH="$PATH"
          fi

          CLANG=$(PATH="$FILTERED_PATH" which clang)
          CLANGPP=$(PATH="$FILTERED_PATH" which clang++)

          SWIFT_TOOLCHAIN_BIN=""
          if command -v swiftly >/dev/null 2>&1; then
            SWIFT_TOOLCHAIN_ROOT="$(swiftly use --print-location 2>/dev/null | grep '^/' | tail -n 1)"
            SWIFT_TOOLCHAIN_BIN="$SWIFT_TOOLCHAIN_ROOT/usr/bin"
          fi
          if [ -z "$SWIFT_TOOLCHAIN_BIN" ] || [ ! -x "$SWIFT_TOOLCHAIN_BIN/swiftc" ]; then
            SWIFT_TOOLCHAIN_BIN="$(dirname "$(PATH="$FILTERED_PATH" which swiftc)")"
          fi

          echo "PATH=$SWIFT_TOOLCHAIN_BIN:$FILTERED_PATH" >> "$GITHUB_ENV"

          cat > .bazelrc.local <<EOF
          build:swift_linux --repo_env=CC=$CLANG
          build:swift_linux --repo_env=CXX=$CLANGPP
          build:swift_linux --action_env=CC=$CLANG
          build:swift_linux --action_env=CXX=$CLANGPP
          EOF

          echo "Configured CC=$CLANG"
          echo "Configured Swift toolchain bin=$SWIFT_TOOLCHAIN_BIN"
          "$CLANG" --version
          "$SWIFT_TOOLCHAIN_BIN/swiftc" --version

      - name: Build
        run: |
          unset SWIFTLY_HOME_DIR
          unset SWIFTLY_BIN_DIR
          make build \
            ${{ matrix.make_args }} \
            BAZEL_ARGS="${BAZEL_CI_ARGS}"
